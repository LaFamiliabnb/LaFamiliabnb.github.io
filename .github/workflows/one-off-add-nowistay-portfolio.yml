name: One-off add Nowistay portfolio search

on: push

permissions:
  contents: write

jobs:
  add-nowistay-portfolio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Integrate Nowistay portfolio widget in reservation page
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('www/booking/reservation.html')
          html = path.read_text(encoding='utf-8')

          if 'traveler.nowistay.com/fr/book/portfolio/yx46t3ub61a5' in html:
              print('Nowistay portfolio widget already present.')
          else:
              css_marker = '    .intro-map, .hero-grid, .listing-section { border-radius: 30px; padding: 28px; margin-bottom: 28px; }'
              css_replacement = '''    .intro-map, .hero-grid, .listing-section { border-radius: 30px; padding: 28px; margin-bottom: 28px; }
    .portfolio-booking {
      background: var(--white);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 30px;
      padding: 28px;
      margin-bottom: 28px;
      overflow: visible;
    }
    .portfolio-booking-card {
      margin-top: 24px;
      border-radius: 24px;
      background: #fff;
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 18px 42px rgba(84,53,18,.08);
      overflow: visible;
    }
    #nowistay-booking { overflow: visible; border-radius: 24px; background: #fff; }
    #nowistay-booking iframe { border-radius: 24px; }'''
              if css_marker not in html:
                  raise SystemExit('CSS insertion marker not found')
              html = html.replace(css_marker, css_replacement, 1)

              html = html.replace(
                  '        <a href="#logements" class="nav-cta" rel="nofollow">Voir les logements</a>',
                  '        <a href="#disponibilites" class="nav-cta" rel="nofollow">Voir les disponibilités</a>',
                  1
              )
              html = html.replace(
                  'Retrouvez les logements gérés par La Familia, visualisez leur emplacement et ouvrez la fiche de l’appartement qui correspond à votre séjour.',
                  'Retrouvez les logements gérés par La Familia, recherchez les disponibilités selon vos dates et ouvrez la fiche détaillée de l’appartement qui correspond à votre séjour.',
                  1
              )
              html = html.replace(
                  '<li><i class="fas fa-map-location-dot"></i><span>Carte des logements</span></li>',
                  '<li><i class="fas fa-calendar-days"></i><span>Recherche par dates et voyageurs</span></li>',
                  1
              )

              hero_end = '    </section>\n\n    <section class="intro-map">'
              nowistay_section = '''    </section>

    <section id="disponibilites" class="portfolio-booking">
      <div class="section-head">
        <div>
          <span class="section-kicker">Disponibilités en direct</span>
          <h2>Trouvez un logement disponible pour votre séjour</h2>
          <p class="section-copy">Sélectionnez vos dates d’arrivée, vos dates de départ et le nombre de voyageurs. Le moteur affiche les logements disponibles sur la période. Vous pourrez ensuite réserver directement ou consulter les fiches détaillées plus bas sur cette page.</p>
        </div>
        <a class="ghost-button" href="#logements" rel="nofollow">Voir les fiches détaillées</a>
      </div>
      <div class="portfolio-booking-card">
        <div id="nowistay-booking"></div>
      </div>
    </section>

    <section class="intro-map">'''
              if hero_end not in html:
                  raise SystemExit('Hero insertion marker not found')
              html = html.replace(hero_end, nowistay_section, 1)

              script_marker = '  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.3/leaflet.min.js"></script>'
              nowistay_script = '''  <script>
    (function(){
      var d = "https://traveler.nowistay.com";
      var c = document.getElementById("nowistay-booking");
      if (!c) return;
      var f = document.createElement("iframe");
      f.src = "https://traveler.nowistay.com/fr/book/portfolio/yx46t3ub61a5";
      f.title = "Recherche de disponibilités Nowistay - La Familia";
      f.style.cssText = "width:100%;border:none;height:800px;max-width:100%;display:block";
      f.setAttribute("scrolling", "no");
      f.setAttribute("frameborder", "0");
      f.setAttribute("allowtransparency", "true");
      c.style.overflow = "visible";
      c.appendChild(f);
      window.addEventListener("message", function(e){
        if (e.origin !== d) return;
        if (e.data && e.data.type === "nowistay-resize" && e.data.height) {
          f.style.height = Math.max(e.data.height + 20, 400) + "px";
        }
      });
    })();
  </script>
'''
              if script_marker not in html:
                  raise SystemExit('Script insertion marker not found')
              html = html.replace(script_marker, nowistay_script + script_marker, 1)

              path.write_text(html, encoding='utf-8')

          Path('.github/workflows/one-off-add-nowistay-portfolio.yml').unlink(missing_ok=True)
          PY

      - name: Commit Nowistay portfolio integration
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Add Nowistay portfolio search to reservation page"
            git push
          else
            echo "No changes needed."
          fi
