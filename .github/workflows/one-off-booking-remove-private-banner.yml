name: One-off remove booking private banner

on:
  push:
    paths:
      - '.github/workflows/one-off-booking-remove-private-banner.yml'

permissions:
  contents: write

jobs:
  remove-banner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove visible noindex banner from booking page
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          target = Path('www/booking/reservation.html')
          content = target.read_text(encoding='utf-8')

          content = content.replace('  <div class="private-note">Page voyageurs volontairement non indexée — le site principal reste dédié aux propriétaires.</div>\n\n', '')
          content = re.sub(r'\n\s*\.private-note \{\n(?:.|\n)*?\n\s*\}\n\n(?=\s*nav \{)', '\n', content, count=1)

          target.write_text(content, encoding='utf-8')

          workflow = Path('.github/workflows/one-off-booking-remove-private-banner.yml')
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Commit booking page cleanup
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Remove visible noindex banner from booking page"
            git push
          else
            echo "No changes needed."
          fi
