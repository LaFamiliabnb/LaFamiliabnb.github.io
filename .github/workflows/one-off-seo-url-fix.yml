name: One-off SEO URL fix

on:
  push:
    paths:
      - '.github/workflows/one-off-seo-url-fix.yml'

permissions:
  contents: write

jobs:
  fix-seo-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix canonical URLs, internal links and pretty blog URLs
        run: |
          python3 <<'PY'
          from pathlib import Path
          from datetime import date
          from html import escape

          ROOT = Path('.')
          CANONICAL_HOST = 'https://www.lafamiliabnb.fr'
          TODAY = date.today().isoformat()

          TEXT_EXTENSIONS = {'.html', '.xml', '.txt', '.js', '.css'}
          EXCLUDED_DIRS = {'.git', '.github', 'node_modules'}
          SEO_EXCLUDED_PREFIXES = ('admin/', 'private/', 'www/booking/', 'booking/', 'img/')

          def is_text_file(path: Path) -> bool:
              return path.suffix.lower() in TEXT_EXTENSIONS and not any(part in EXCLUDED_DIRS for part in path.parts)

          def normalize_text(content: str) -> str:
              replacements = {
                  'https://lafamiliabnb.fr/': 'https://www.lafamiliabnb.fr/',
                  'https://lafamiliabnb.fr': 'https://www.lafamiliabnb.fr',
                  'https://www.lafamiliabnb.fr/conciergerie-airbnb-aix-en-provence.html': 'https://www.lafamiliabnb.fr/conciergerie-airbnb-aix-en-provence/',
                  '/conciergerie-airbnb-aix-en-provence.html': '/conciergerie-airbnb-aix-en-provence/',
              }
              for old, new in replacements.items():
                  content = content.replace(old, new)
              return content

          # 1) Normalize canonicals, OG URLs and internal links in all static text files.
          for path in ROOT.rglob('*'):
              if not path.is_file() or not is_text_file(path):
                  continue
              content = path.read_text(encoding='utf-8')
              updated = normalize_text(content)
              if updated != content:
                  path.write_text(updated, encoding='utf-8')

          # 2) Convert blog/*.html articles to real pretty URLs: blog/slug/index.html.
          blog_dir = ROOT / 'blog'
          if blog_dir.exists():
              for source in sorted(blog_dir.glob('*.html')):
                  slug = source.stem
                  target_dir = blog_dir / slug
                  target = target_dir / 'index.html'

                  source_content = source.read_text(encoding='utf-8')
                  if 'http-equiv="refresh"' not in source_content and "http-equiv='refresh'" not in source_content:
                      target_dir.mkdir(parents=True, exist_ok=True)
                      pretty_content = normalize_text(source_content)
                      pretty_content = pretty_content.replace(f'{CANONICAL_HOST}/blog/{slug}.html', f'{CANONICAL_HOST}/blog/{slug}/')
                      pretty_content = pretty_content.replace(f'href="/blog/{slug}.html"', f'href="/blog/{slug}/"')
                      pretty_content = pretty_content.replace(f"href='/blog/{slug}.html'", f"href='/blog/{slug}/'")
                      pretty_content = pretty_content.replace(f'content="{CANONICAL_HOST}/blog/{slug}.html"', f'content="{CANONICAL_HOST}/blog/{slug}/"')
                      pretty_content = pretty_content.replace(f'"mainEntityOfPage":"{CANONICAL_HOST}/blog/{slug}.html"', f'"mainEntityOfPage":"{CANONICAL_HOST}/blog/{slug}/"')
                      target.write_text(pretty_content, encoding='utf-8')

                  redirect = f'''<!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Redirection | La Familia</title>
            <meta name="robots" content="noindex, follow">
            <link rel="canonical" href="{CANONICAL_HOST}/blog/{escape(slug)}/">
            <meta http-equiv="refresh" content="0; url=/blog/{escape(slug)}/">
          </head>
          <body>
            <p>Redirection vers <a href="/blog/{escape(slug)}/">l’article La Familia</a>.</p>
          </body>
          </html>
          '''
                  source.write_text(redirect, encoding='utf-8')

          # 3) Regenerate sitemap from the actual canonical pretty URLs present in the repo.
          urls = set()
          for index_file in ROOT.rglob('index.html'):
              rel_parent = index_file.parent.relative_to(ROOT).as_posix()
              if rel_parent == '.':
                  url_path = '/'
              else:
                  if rel_parent.startswith(SEO_EXCLUDED_PREFIXES):
                      continue
                  url_path = f'/{rel_parent}/'
              urls.add(url_path)

          # Keep legal and main static pages if they exist as directories; exclude redirect-only .html files from sitemap.
          def priority(url_path: str) -> str:
              if url_path == '/':
                  return '1.0'
              if url_path in {
                  '/conciergerie-airbnb-aix-en-provence/',
                  '/tarifs-conciergerie-airbnb-aix-en-provence/',
                  '/estimation-revenus-airbnb-aix-en-provence/',
              }:
                  return '0.9'
              if url_path == '/blog/':
                  return '0.8'
              if url_path.startswith('/blog/'):
                  return '0.75'
              if url_path in {'/mentions-legales/', '/politique-confidentialite/'}:
                  return '0.3'
              return '0.75'

          def changefreq(url_path: str) -> str:
              if url_path in {'/', '/blog/'}:
                  return 'weekly'
              if url_path in {'/mentions-legales/', '/politique-confidentialite/'}:
                  return 'yearly'
              return 'monthly'

          ordered = sorted(urls, key=lambda p: (p != '/', p.count('/'), p))
          lines = ['<?xml version="1.0" encoding="UTF-8"?>', '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">']
          for url_path in ordered:
              lines.extend([
                  '  <url>',
                  f'    <loc>{CANONICAL_HOST}{url_path}</loc>',
                  f'    <lastmod>{TODAY}</lastmod>',
                  f'    <changefreq>{changefreq(url_path)}</changefreq>',
                  f'    <priority>{priority(url_path)}</priority>',
                  '  </url>',
                  '',
              ])
          lines.append('</urlset>')
          (ROOT / 'sitemap.xml').write_text('\n'.join(lines), encoding='utf-8')

          # 4) Remove this one-off workflow after it has performed the cleanup.
          workflow = ROOT / '.github' / 'workflows' / 'one-off-seo-url-fix.yml'
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Commit SEO URL fixes
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Fix SEO URL canonicals and pretty URLs"
            git push
          else
            echo "No SEO URL changes needed."
          fi
