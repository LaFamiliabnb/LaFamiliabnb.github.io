name: One-off fix booking brand links

on: push

permissions:
  contents: write

jobs:
  fix-booking-brand-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Point booking header brand links to main website
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          target = 'https://www.lafamiliabnb.fr/'
          changed = []

          for path in sorted(Path('www/booking').rglob('*.html')):
              html = path.read_text(encoding='utf-8')
              original = html

              # Main booking pages use a single .brand anchor containing the logo and name.
              html = re.sub(
                  r'(<a\s+class="brand"\s+)href="[^"]+"',
                  rf'\1href="{target}"',
                  html
              )

              # Apartment pages use two no-underline links: logo + La Familia text.
              html = html.replace('href="../reservation.html" class="no-underline"', f'href="{target}" class="no-underline"')
              html = html.replace("href='../reservation.html' class='no-underline'", f"href='{target}' class='no-underline'")

              if html != original:
                  path.write_text(html, encoding='utf-8')
                  changed.append(str(path))

          print('Updated files:')
          for item in changed:
              print('-', item)

          workflow = Path('.github/workflows/one-off-fix-booking-brand-links.yml')
          workflow.unlink(missing_ok=True)
          PY

      - name: Commit fixed brand links
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Point booking brand links to main website"
            git push
          else
            echo "No changes needed."
          fi
