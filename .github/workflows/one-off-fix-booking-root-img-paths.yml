name: One-off fix booking apartment root image paths

on: push

permissions:
  contents: write

jobs:
  fix-booking-root-img-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace apartment image paths with absolute main-site image URLs
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          booking_pages = Path('www/booking/logements')
          root_img = Path('img')
          base_url = 'https://www.lafamiliabnb.fr/img/'

          def replace_path(match):
              quote = match.group(1)
              path = match.group(2)
              if '/' not in path:
                  return match.group(0)
              folder = path.split('/', 1)[0]
              if not (root_img / folder).is_dir():
                  return match.group(0)
              return f'src={quote}{base_url}{path}{quote}'

          changed = []
          for html_file in sorted(booking_pages.glob('appartement-*.html')):
              html = html_file.read_text(encoding='utf-8')
              new_html = re.sub(r'src=("|\')\.\./img/([^"\']+)("|\')', lambda m: replace_path(m), html)
              if new_html != html:
                  html_file.write_text(new_html, encoding='utf-8')
                  changed.append(str(html_file))

          print('Updated files:')
          for item in changed:
              print('-', item)

          workflow = Path('.github/workflows/one-off-fix-booking-root-img-paths.yml')
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Commit fixed image paths
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Fix booking apartment image paths to main img folder"
            git push
          else
            echo "No changes needed."
          fi
