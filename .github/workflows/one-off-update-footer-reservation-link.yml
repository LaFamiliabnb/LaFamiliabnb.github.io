name: One-off update footer reservation link

on: push

permissions:
  contents: write

jobs:
  update-footer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace footer Check-in link with reservation link
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          reservation_li = '<li><a href="https://booking.lafamiliabnb.fr/reservation.html">Réserver un logement</a></li>'
          changed = []

          for path in sorted(Path('.').rglob('*.html')):
              if '.git' in path.parts:
                  continue
              html = path.read_text(encoding='utf-8')
              original = html

              # In footer Services column: replace Check-in Airbnb by Réserver un logement.
              html = html.replace(
                  '<li><a href="/check-in-airbnb-aix-en-provence/">Check-in Airbnb</a></li>',
                  reservation_li
              )

              # Remove Logements gérés from the Propriétaires column when present.
              html = html.replace(
                  '          <li><a href="/nos-logements/">Logements gérés</a></li>\n',
                  ''
              )
              html = html.replace(
                  '          <li><a href="/nos-logements/">Logements geres</a></li>\n',
                  ''
              )

              # If a page already had a reservation link duplicated elsewhere in Services, collapse duplicates.
              html = re.sub(
                  r'(\s*<li><a href="https://booking\.lafamiliabnb\.fr/reservation\.html">Réserver un logement</a></li>\n)(?:\s*<li><a href="https://booking\.lafamiliabnb\.fr/reservation\.html">Réserver un logement</a></li>\n)+',
                  r'\1',
                  html
              )

              if html != original:
                  path.write_text(html, encoding='utf-8')
                  changed.append(str(path))

          print('Updated files:')
          for item in changed:
              print('-', item)

          Path('.github/workflows/one-off-update-footer-reservation-link.yml').unlink(missing_ok=True)
          PY

      - name: Commit footer update
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Update footer reservation link"
            git push
          else
            echo "No changes needed."
          fi
