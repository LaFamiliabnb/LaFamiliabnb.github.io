name: One-off blog card images

on: push

permissions:
  contents: write

jobs:
  update-blog-card-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set unique blog card images from img folder
        run: |
          python3 <<'PY'
          from pathlib import Path

          page = Path('blog/index/index.html')
          html = page.read_text(encoding='utf-8')

          start = html.index('    .article-image {')
          end = html.index('    .article-content {', start)

          new_css = '''    .article-image { background: linear-gradient(180deg, rgba(32,32,32,.03), rgba(32,32,32,.22)), url("/img/living-room-8368673_1280.webp"); background-size: cover; background-position: center; min-height: 210px; }
    .article-card.card-revenus .article-image { background-image: linear-gradient(180deg, rgba(32,32,32,.03), rgba(32,32,32,.22)), url("/img/cours.jpg"); }
    .article-card.card-reglementation .article-image { background-image: linear-gradient(180deg, rgba(32,32,32,.03), rgba(32,32,32,.22)), url("/img/ateliercezanne.jpg"); }
    .article-card.card-conciergerie .article-image { background-image: linear-gradient(180deg, rgba(32,32,32,.03), rgba(32,32,32,.22)), url("/img/living-room-8368673_1280.webp"); }
    .article-card.card-tarif .article-image { background-image: linear-gradient(180deg, rgba(32,32,32,.03), rgba(32,32,32,.22)), url("/img/argent.png"); }
    .article-card.card-location .article-image { background-image: linear-gradient(180deg, rgba(32,32,32,.03), rgba(32,32,32,.22)), url("/img/flexible.webp"); }
    .article-card.card-menage .article-image { background-image: linear-gradient(180deg, rgba(32,32,32,.03), rgba(32,32,32,.22)), url("/img/entretien.png"); }
    .article-card.card-quartiers .article-image { background-image: linear-gradient(180deg, rgba(32,32,32,.03), rgba(32,32,32,.22)), url("/img/marcheaix.jpg"); }
    .article-card.card-optimisation .article-image { background-image: linear-gradient(180deg, rgba(32,32,32,.03), rgba(32,32,32,.22)), url("/img/ill-graph.webp"); }
'''

          html = html[:start] + new_css + html[end:]
          page.write_text(html, encoding='utf-8')
          Path('.github/workflows/one-off-blog-card-images.yml').unlink(missing_ok=True)
          PY

      - name: Commit blog card images update
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Use unique images for blog cards"
            git push
          else
            echo "No changes needed."
          fi
